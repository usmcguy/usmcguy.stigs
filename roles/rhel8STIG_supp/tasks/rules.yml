- name: Check for EFI directory
  ansible.builtin.stat:
    path: /sys/firmware/efi
    get_checksum: false
    get_mime: false
  register: efi_dir

- name: Set boot_mode fact
  ansible.builtin.set_fact:
    boot_mode: "{{ 'UEFI' if efi_dir.stat.exists else 'BIOS' }}"

- name: Slurp /etc/login.defs
  ansible.builtin.slurp:
    path: /etc/login.defs
  register: login_defs_raw
  no_log: true

- name: Decode login.defs content
  ansible.builtin.set_fact:
    login_defs: "{{ login_defs_raw.content | b64decode }}"
  no_log: true

- name: Slurp /etc/default/useradd
  ansible.builtin.slurp:
    src: /etc/default/useradd
  register: useradd_file
  no_log: true

- name: Set default_home_path
  ansible.builtin.set_fact:
    default_home_path: "{{ useradd_file.content
                        | b64decode
                        | regex_search('^HOME=(.*)$', '\\1', multiline=True)
                        | join(',') }}"

- name: Extract UID/SYS_UID ranges from login.defs
  ansible.builtin.set_fact:
    # sys_uid_min: "{{ login_defs | regex_search('^SYS_UID_MIN\\s+([0-9]+)', '\\1', multiline=True) | default(['201'], true) | first | int }}"
    sys_uid_max: "{{ login_defs | regex_search('^SYS_UID_MAX\\s+([0-9]+)', '\\1', multiline=True) | default(['999'], true) | first | int }}"
    uid_min: "{{ login_defs | regex_search('^UID_MIN\\s+([0-9]+)', '\\1', multiline=True) | default(['1000'], true) | first | int }}"
    # uid_max: "{{ login_defs | regex_search('^UID_MAX\\s+([0-9]+)', '\\1', multiline=True) | default(['60000'], true) | first | int }}"
    # sys_gid_min: "{{ login_defs | regex_search('^SYS_GID_MIN\\s+([0-9]+)', '\\1', multiline=True) | default(['201'], true) | first | int }}"
    sys_gid_max: "{{ login_defs | regex_search('^SYS_GID_MAX\\s+([0-9]+)', '\\1', multiline=True) | default(['999'], true) | first | int }}"
    gid_min: "{{ login_defs | regex_search('^GID_MIN\\s+([0-9]+)', '\\1', multiline=True) | default(['1000'], true) | first | int }}"
    # gid_max: "{{ login_defs | regex_search('^GID_MAX\\s+([0-9]+)', '\\1', multiline=True) | default(['60000'], true) | first | int }}"

- name: Get user account info
  ansible.builtin.getent:
    database: passwd
  register: getent_passwd

- name: Create interactive user list
  ansible.builtin.set_fact:
    interactive_user_list: "{{ interactive_user_list | default([]) + [item] }}"
  loop: "{{ ansible_facts.getent_passwd | dict2items }}"
  no_log: true
  when:
    - item.value is sequence
    - item.value[1] | int >= ( uid_min | int )
    - "'nologin' not in item.value[4]"
    - item.value[4] != "/"

- name: Print list of discovered interactive users
  ansible.builtin.debug:
    msg: "{{ interactive_user_list | map(attribute='key') | list | join(', ') }}"

- name: Create system account list
  ansible.builtin.set_fact:
    system_acct_list: "{{ system_acct_list | default([]) + [item] }}"
  loop: "{{ ansible_facts.getent_passwd | dict2items }}"
  no_log: true
  when:
    - item.value is sequence
    - item.value[1] | int <= ( sys_uid_max | int )

- name: Print list of discovered system accounts
  ansible.builtin.debug:
    msg: "{{ system_acct_list | map(attribute='key') | list | join(', ') }}"

- name: Get group account info
  ansible.builtin.getent:
    database: group
  register: getent_group

- name: Create non-system group list
  ansible.builtin.set_fact:
    nonsystem_group_list: "{{ nonsystem_group_list | default([]) + [item] }}"
  loop: "{{ ansible_facts.getent_group | dict2items }}"
  no_log: true
  when:
    - item.value is sequence
    - item.value[1] | int >= ( gid_min | int )

- name: Print list of discovered non-system groups
  ansible.builtin.debug:
    msg: "{{ nonsystem_group_list | map(attribute='key') | list | join(', ') }}"

- name: Create system group list
  ansible.builtin.set_fact:
    system_group_list: "{{ system_group_list | default([]) + [item] }}"
  loop: "{{ ansible_facts.getent_group | dict2items }}"
  no_log: true
  when:
    - item.value is sequence
    - item.value[1] | int <= ( sys_gid_max | int )

- name: Print list of discovered system groups
  ansible.builtin.debug:
    msg: "{{ system_group_list | map(attribute='key') | list | join(', ') }}"

- name: Deploy updated authselect profile templates
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: /usr/share/authselect/default/{{ rhel8STIG_stigrule_authselect_profile }}/{{ item }}
    owner: root
    group: root
    mode: '0644'
  loop:
    - password-auth
    - smartcard-auth
    - system-auth

- name: STIGrule_230222__dnf_update
  ansible.builtin.dnf:
    name: '*'
    state: "{{ rhel8STIG_stigrule_230222__dnf_State }}"
    update_cache: true
    skip_broken: true
    lock_timeout: 60
    update_only: true
  when: rhel8STIG_stigrule_230222_Manage

# V-230223 RHEL-08-010020
- name: Get current system-wide cryptographic policy
  ansible.builtin.command:
    cmd: update-crypto-policies --show
  changed_when: false
  register: current_crypto_policy
  when: rhel8STIG_stigrule_230223_Manage

- name: Filter crypto subpolicies
  ansible.builtin.set_fact:
    crypto_subpolicies: "{{ (current_crypto_policy.stdout | split(':'))[1:] }}"
  when: rhel8STIG_stigrule_230223_Manage

- name: Slurp current crypto policy file
  ansible.builtin.slurp:
    path: /etc/crypto-policies/state/CURRENT.pol
  register: current_crypto_policy_pol_raw
  when: rhel8STIG_stigrule_230223_Manage
  no_log: true

- name: Decode current crypto policy file content
  ansible.builtin.set_fact:
    current_crypto_policy_pol: "{{ current_crypto_policy_pol_raw.content | b64decode }}"
  no_log: true
  when: rhel8STIG_stigrule_230223_Manage

- name: STIGrule_230223__create_stig_subpolicy_cipher_SSH
  community.general.ini_file:
    path: /etc/crypto-policies/policies/modules/STIG.pmod
    ignore_spaces: true
    option: cipher@SSH
    value: AES-256-GCM AES-256-CTR AES-128-GCM AES-128-CTR
    mode: "0644"
    owner: root
    group: root
  register: subpolicy_cipher_SSH
  when: rhel8STIG_stigrule_230223_Manage

- name: STIGrule_230223__create_stig_subpolicy_mac_SSH
  community.general.ini_file:
    path: /etc/crypto-policies/policies/modules/STIG.pmod
    ignore_spaces: true
    option: mac@SSH
    value: HMAC-SHA2-512 HMAC-SHA2-256
    mode: '0644'
    owner: root
    group: root
  register: subpolicy_mac_SSH
  when: rhel8STIG_stigrule_230223_Manage

- name: STIGrule_230223__update_crypto_policy # noqa: command-instead-of-shell
  ansible.builtin.shell:
    cmd: update-crypto-policies --set FIPS:{{ (['STIG'] + (crypto_subpolicies | default('')) | reject('equalto', '') | list) | unique | join(':') }}
  when:
    - rhel8STIG_stigrule_230223_Manage
    - (not current_crypto_policy.stdout.startswith('FIPS'))
      or (subpolicy_cipher_SSH.changed)
      or (subpolicy_mac_SSH.changed)
      or ('hash = SHA2-256 SHA2-384 SHA2-512 SHA2-224 SHA3-256 SHA3-384 SHA3-512' not in current_crypto_policy_pol)
      or ('min_rsa_size = 2048' not in current_crypto_policy_pol)
  register: update_crypto_polices
  changed_when: update_crypto_polices.rc == 0
  notify: reboot

# V-230229 RHEL-08-010090
# https://dl.dod.cyber.mil/wp-content/uploads/pki-pke/zip/unclass-certificates_pkcs7_DoD.zip
- name: STIGrule_230229__define_vars
  ansible.builtin.set_fact:
    dod_work_dir: /tmp/dod_certs
    sssd_ca_db: /etc/sssd/pki/sssd_auth_ca_db.pem
  when: rhel8STIG_stigrule_230229_Manage

- name: STIGrule_230229__create_working_dir
  ansible.builtin.file:
    path: "{{ dod_work_dir }}"
    state: directory
    mode: '0755'
  when: rhel8STIG_stigrule_230229_Manage

- name: STIGrule_230229__unarchive_DoD_certs
  ansible.builtin.unarchive:
    src: files/unclass-certificates_pkcs7_DoD.zip
    dest: "{{ dod_work_dir }}"
  when: rhel8STIG_stigrule_230229_Manage

- name: STIGrule_230229__find_pem_p7b
  ansible.builtin.find:
    path: "{{ dod_work_dir }}"
    recurse: true
    patterns: '(?i).*pem.p7b'
    use_regex: true
    file_type: file
  register: dod_pem_p7b
  when: rhel8STIG_stigrule_230229_Manage

- name: STIGrule_230229__define_dod_p7b_path
  ansible.builtin.set_fact:
    dod_p7b_path: "{{ (dod_pem_p7b.files | first).path }}"
  when: rhel8STIG_stigrule_230229_Manage

- name: STIGrule_230229__convert_p7b_to_pem
  ansible.builtin.command:
    cmd: "openssl pkcs7 -print_certs -in {{ dod_p7b_path }} -out {{ dod_work_dir }}/dod_bundle.pem"
    creates: "{{ dod_work_dir }}/dod_bundle.pem"
  register: pkcs7_convert
  changed_when: pkcs7_convert.rc == 0 and ('skipped' not in pkcs7_convert.stdout)
  when: rhel8STIG_stigrule_230229_Manage

- name: STIGrule_230229__read_dod_bundle_pem
  ansible.builtin.slurp:
    path: "{{ dod_work_dir }}/dod_bundle.pem"
  register: dod_bundle_raw
  when: rhel8STIG_stigrule_230229_Manage
  no_log: true

- name: STIGrule_230229__split_dod_bundle_pem
  ansible.builtin.set_fact:
    dod_bundle_pems: >-
      {{ (dod_bundle_raw.content | b64decode)
          | regex_findall('-----BEGIN CERTIFICATE-----(?:.|\n)+?-----END CERTIFICATE-----',
                          multiline=True) }}
  when: rhel8STIG_stigrule_230229_Manage
  no_log: true

- name: STIGrule_230229__read_cert_info
  community.crypto.x509_certificate_info:
    content: "{{ item }}"
  loop: "{{ dod_bundle_pems }}"
  register: dod_ca_infos
  no_log: true
  when: rhel8STIG_stigrule_230229_Manage
  delegate_to: localhost

- name: STIGrule_230229__sssd_ca_db_stat
  ansible.builtin.stat:
    path: "{{ sssd_ca_db }}"
    get_checksum: false
    get_mime: false
  register: sssd_ca_db_stat
  when: rhel8STIG_stigrule_230229_Manage

- name: STIGrule_230229__create_empty_sssd_ca_db
  ansible.builtin.copy:
    content: ''
    dest: "{{ sssd_ca_db }}"
    mode: '0640'
    owner: root
    group: sssd
  when:
    - rhel8STIG_stigrule_230229_Manage
    - not sssd_ca_db_stat.stat.exists

- name: STIGrule_230229__read_sssd_ca_db
  ansible.builtin.slurp:
    path: "{{ sssd_ca_db }}"
  register: sssd_db_raw
  become: true
  no_log: true
  when:
    - rhel8STIG_stigrule_230229_Manage
    - sssd_ca_db_stat.stat.exists

- name: STIGrule_230229__split_sssd_ca_bundle
  ansible.builtin.set_fact:
    sssd_db_pems: >-
      {{ (sssd_db_raw.content | b64decode)
        | regex_findall('-----BEGIN CERTIFICATE-----(?:.|\n)+?-----END CERTIFICATE-----',
        multiline=True) }}
  no_log: true
  when:
    - false
    - rhel8STIG_stigrule_230229_Manage
    - sssd_ca_db_stat.stat.exists

- name: STIGrule_230229__create_empty_db_pems
  ansible.builtin.set_fact:
    sssd_db_pems: []
  when:
    - false
    - rhel8STIG_stigrule_230229_Manage
    - not sssd_ca_db_stat.stat.exists


- name: STIGrule_230229__initialize_missing_root_cas
  ansible.builtin.set_fact:
    missing_root_cas: []
  when: rhel8STIG_stigrule_230229_Manage

- name: STIGrule_230229__id_missing_cas
  ansible.builtin.set_fact:
    missing_root_cas: >-
      {{ missing_root_cas
        + [ { 'name': item.subject.commonName, 'pem': item.item,
        'subject_line':
        'subject=C = ' ~ (item.subject.countryName | default('US'))
        ~ ', O = ' ~ (item.subject.organizationName | default('U.S. Government'))
        ~ ', OU = ' ~ (item.subject_ordered.organizationalUnitName[0] | default('DoD'))
        ~ ', OU = ' ~ (item.subject_ordered.organizationalUnitName[1] | default('PKI'))
        ~ ', CN = ' ~ item.subject.commonName,
      'issuer_line':
        'issuer=C = ' ~ (item.issuer.countryName | default('US'))
        ~ ', O = ' ~ (item.issuer.organizationName | default('U.S. Government'))
        ~ ', OU = ' ~ (item.issuer_ordered.organizationalUnitName[0] | default('DoD'))
        ~ ', OU = ' ~ (item.issuer_ordered.organizationalUnitName[1] | default('PKI'))
        ~ ', CN = ' ~ item.issuer.commonName,
          } ] }}
  loop: "{{ dod_ca_infos.results }}"
  no_log: true
  when:
    - rhel8STIG_stigrule_230229_Manage
    - >
      (not item.expired | default(true)) and
      (item.subject is defined) and
      (item.subject.commonName is defined) and
      (
        sssd_db_pems
        | select('equalto', item.item)
        | list
        | length == 0
      )

- name: STIGrule_230229__create_block_string
  ansible.builtin.set_fact:
    missing_root_cas_block: "{{ (missing_root_cas_block | default([]))
                                + [ item.subject_line ~ '\n\n'
                                    ~ item.issuer_line ~ '\n\n'
                                    ~ item.pem ~ '\n\n' ] }}"
  loop: "{{ missing_root_cas }}"
  loop_control:
    label: "{{ item.name }}"
  no_log: true
  when:
    - rhel8STIG_stigrule_230229_Manage
    - missing_root_cas | length > 0

- name: STIGrule_230229__concatinate_missing_cas
  ansible.builtin.set_fact:
    missing_root_cas_concat: "{{ missing_root_cas_block | join('') }}"
  no_log: true
  when:
    - rhel8STIG_stigrule_230229_Manage
    - missing_root_cas | length > 0

- name: STIGrule_230229__update_sssd_auth_ca_db_pem
  ansible.builtin.copy:
    dest: "{{ sssd_ca_db }}"
    content: "{{ sssd_db_raw.content | b64decode }}{{ missing_root_cas_concat }}"
    mode: "0640"
    owner: root
    group: sssd
  become: true
  notify: sssd_restart
  when:
    - rhel8STIG_stigrule_230229_Manage
    - sssd_ca_db_stat.stat.exists
    - missing_root_cas | length > 0

# V-230232
- name: Read shadow entries
  ansible.builtin.command: getent shadow
  register: shadow_entries
  changed_when: false
  no_log: true
  when: rhel8STIG_stigrule_230232_Manage

- name: Identify users without SHA-512 password hash
  ansible.builtin.set_fact:
    non_sha512_users: >-
      {{
        shadow_entries.stdout_lines
        | map('split', ':')
        | rejectattr('0', 'in', rhel8STIG_stigrule_230232_protected_accts | default([]))
        | rejectattr('0', 'in', rhel8STIG_stigrule_230232_exempt_users | default([]))
        | rejectattr('1', 'match', '^[!*]')
        | rejectattr('1', 'match', '^\$6\$')
        | map(attribute='0')
        | list
      }}
  no_log: false
  when: rhel8STIG_stigrule_230232_Manage

- name: Report users that will be disabled
  ansible.builtin.debug:
    msg: >-
      The following accounts do NOT use SHA-512 password hashes and will be disabled:
      {{ non_sha512_users | join(', ') }}
  when:
    - rhel8STIG_stigrule_230232_Manage
    - non_sha512_users | length != 0

- name: STIGrule_230233__lock_non-sha512_user_passwords
  ansible.builtin.user:
    name: "{{ item }}"
    password_lock: true
  loop: "{{ non_sha512_users }}"
  when:
    - rhel8STIG_stigrule_230232_Manage
    - non_sha512_users | length != 0

- name: Install python3-pexpect for ansible.builtin.expect
  ansible.builtin.package:
    name: python3-pexpect
    state: present

# V-230234
- name: Check if /boot/efi/EFI/redhat/user.cfg present
  ansible.builtin.stat:
    path: /boot/efi/EFI/redhat/user.cfg
  register: user_cfg_stat

- name: Check for UEFI grub2_password
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      grep -iw grub2_password /boot/efi/EFI/redhat/user.cfg || true
  register: grub_pass_check_uefi
  changed_when: false
  no_log: true
  when:
    - rhel8STIG_stigrule_230234_Manage
    - boot_mode == "UEFI"
    - user_cfg_stat.stat.exists

- name: STIGrule_230234__set_grub_pass
  ansible.builtin.expect:
    command: grub2-setpassword
    responses:
      (?i)Password: "{{ rhel8STIG_stigrule_230234_grub_password }}"
      (?i)Confirm password: "{{ rhel8STIG_stigrule_230234_grub_password }}"
  no_log: true
  when:
    - rhel8STIG_stigrule_230234_Manage
    - boot_mode == "UEFI"
    - >
      not user_cfg_stat.stat.exists or
      grub_pass_check_uefi.stdout | length == 0

