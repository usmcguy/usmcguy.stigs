- name: STIGrule_254520__get_selinux_logins
  ansible.builtin.command:
    cmd: semanage login -l -n
  register: semanage_login_raw
  changed_when: false
  when: rhel8STIG_stigrule_254520_Manage

- name: STIGrule_254520__build_login_dictionary
  ansible.builtin.set_fact:
    selinux_login_map: >-
      {{
        (selinux_login_map | default([]))
        + [ {
              'login':  (item.split()[0]),
              'seuser': (item.split()[1] | default('')),
              'range':  (item.split()[2] | default(''))
            } ]
      }}
  loop: "{{ semanage_login_lines }}"
  vars:
    semanage_login_lines: >-
      {{ semanage_login_raw.stdout_lines
          | reject('search', 'Login Name')
          | reject('search', '^[- ]+$')
          | list }}
  when: rhel8STIG_stigrule_254520_Manage

- name: STIGrule_254520__set_specified users to the sysadm_u SELinux user # noqa: command-instead-of-shell
  ansible.builtin.shell:
    cmd: >-
      semanage login
      {{ have_mapping | ternary('-m', '-a') }}
      -s {{ target_seuser }}
      -r {{ desired_range }}
      {{ desired_login }}
  loop: "{{ rhel8STIG_stigrule_254520_sysadm_u_selinux_users }}"
  loop_control:
    label: "{{ desired_login }}"
  register: sysadm_result
  changed_when: sysadm_result.rc == 0
  vars:
    target_seuser: sysadm_u
    desired_login: >-
      {{ item.user if (item is mapping) else item }}
    desired_range: >-
      {{ (item.mcs_range if (item is mapping and 'mcs_range' in item)
          else 's0-s0:c0.c1023') }}
    existing: >-
      {{ selinux_login_map
          | selectattr('login', 'equalto', desired_login)
          | list
          | first
          | default({}) }}
    current_seuser: "{{ existing.seuser | default('') }}"
    current_range: "{{ existing.range | default('') }}"
    have_mapping: "{{ existing != {} }}"
  when:
    - rhel8STIG_stigrule_254520_Manage
    - rhel8STIG_stigrule_254520_sysadm_u_selinux_users | length > 0
    - current_seuser != target_seuser
      or current_range != desired_range

