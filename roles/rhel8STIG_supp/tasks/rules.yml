# V-230557 | RHEL-08-040350
- name: Check if tftp-server installed
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      rpm -qa | grep -i tftp-server || true
  register: tftp_installed
  changed_when: false
  when: rhel8STIG_stigrule_230557_Manage

- name: Check if tftp-server in secure mode
  ansible.builtin.command:
    cmd: grep -i execstart /usr/lib/systemd/system/tftp.service
  register: tftp_execstart
  changed_when: false
  failed_when: false
  when:
    - rhel8STIG_stigrule_230557_Manage
    - tftp_installed.stdout_lines | length > 0

- name: Ensure tftp.service.d directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/tftp.service.d
    state: directory
    owner: root
    group: root
    mode: '0755'
  when:
    - rhel8STIG_stigrule_230557_Manage
    - tftp_installed.stdout_lines | length > 0

- name: stigrule_230557__enable_secure_mode
  community.general.ini_file:
    path: /etc/systemd/system/tftp.service.d/override.conf
    exclusive: true
    no_extra_spaces: true
    ignore_spaces: true
    section: Service
    option: ExecStart
    value: "/usr/sbin/in.tftpd -s /var/lib/tftpboot"
    owner: root
    group: root
    mode: '0755'
  notify:
    - daemon_reload
    - restart_tftp
  when:
    - rhel8STIG_stigrule_230557_Manage
    - tftp_installed.stdout_lines | length > 0
    - tftp_execstart.rc == 0

