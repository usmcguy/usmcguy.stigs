# #V-230479
- name: STIGrule_230479_Check for existing remote syslog configuration
  ansible.builtin.command:
    cmd: >
        grep -r '^[^#].*@' /etc/rsyslog.conf /etc/rsyslog.d/*.conf
  register: rsyslog_remote_check
  changed_when: false
  failed_when: rsyslog_remote_check.rc not in [0, 1, 2]
  when: rhel8STIG_stigrule_230479_Manage

- name: STIGrule_230479_Add remote syslog rule to /etc/rsyslog.d if none found
  ansible.builtin.copy:
    dest: /etc/rsyslog.d/99-remote-syslog.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      # For UDP use: *.* @{{ rhel8STIG_stigrule_230479_syslog_host }}:{{ rhel8STIG_stigrule_230479_syslog_port }}
      # For TCP use: *.* @@{{ rhel8STIG_stigrule_230479_syslog_host }}:{{ rhel8STIG_stigrule_230479_syslog_port }}
      *.* {{ '@@' if rhel8STIG_stigrule_230479_protocol == 'TCP' else '@' }}{{ rhel8STIG_stigrule_230479_syslog_host }}:{{ rhel8STIG_stigrule_230479_syslog_port }}
  notify: restart_rsyslog
  when:
    - rhel8STIG_stigrule_230479_Manage
    - rsyslog_remote_check.stdout_lines | length == 0

