  changed_when: false

- name: Build pwquality file list in precedence order
  ansible.builtin.set_fact:
    rhel8stig_v251716_pwquality_files: >-
      {{
        ['/etc/security/pwquality.conf']
        + (
            rhel8stig_v251716_pwquality_dropins.files
            | default([])
            | map(attribute='path')
            | sort
            | list
          )
      }}

- name: Find pwquality files containing retry
  ansible.builtin.shell: |
    grep -q -E '^[[:space:]]*retry[[:space:]]*=' "{{ item }}"
  args:
    executable: /bin/bash
  loop: "{{ rhel8stig_v251716_pwquality_files }}"
  register: rhel8stig_v251716_retry_scan
  changed_when: false
  failed_when: false

- name: Build retry file list in order
  ansible.builtin.set_fact:
    rhel8stig_v251716_retry_files: >-
      {{
        rhel8stig_v251716_retry_scan.results
        | selectattr('rc', 'equalto', 0)
        | map(attribute='item')
        | list
      }}

- name: Set first retry file
  ansible.builtin.set_fact:
    rhel8stig_v251716_first_retry_file: >-
      {{ rhel8stig_v251716_retry_files | first | default('') }}

- name: Remove retry from files after first occurrence
  community.general.ini_file:
    path: "{{ item }}"
    option: retry
    state: absent
    no_extra_spaces: true
    create: false
  loop: >-
    {{
      (rhel8stig_v251716_retry_files | length > 1)
      | ternary(
          rhel8stig_v251716_retry_files[1:],
          []
        )
    }}
  when:
    - rhel8stig_v251716_retry_files | length > 1

- name: stigrule_251716__add_retry_to_pwquality.conf
  community.general.ini_file:
    path: /etc/security/pwquality.conf
    option: retry
    value: '3'
    state: present
    no_extra_spaces: false
    create: true
    mode: '0644'
    owner: root
    group: root
  when:
    - rhel8stig_v251716_retry_files | length == 0

