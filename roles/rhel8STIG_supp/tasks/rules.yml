# V-230243 RHEL-08-010190
- name: STIGrule_230243__excluded_ww_paths
  ansible.builtin.set_fact:
    exclude_ww_paths: >-
      {{ rhel8STIG_stigrule_230243_ignore_dirs
        | map('regex_replace', '^(.*)$', "-path '\1'")
        | join(' -o ')
      }}
  when: rhel8STIG_stigrule_230243_Manage

- name: Define exclude_ww_cmd with provided list
  ansible.builtin.set_fact:
    exclude_ww_cmd: '\( {{ exclude_ww_paths }} \) -prune -o '
  when:
    - rhel8STIG_stigrule_230243_Manage
    - exclude_ww_paths is defined
    - exclude_ww_paths | length > 0

- name: Define exclude_ww_cmd with empty string
  ansible.builtin.set_fact:
    exclude_ww_cmd: ''
  when:
    - rhel8STIG_stigrule_230243_Manage
    - exclude_ww_paths is not defined or exclude_ww_paths | length == 0

- name: STIGrule_230243__chmod_ww
  ansible.builtin.shell: |
    set -o pipefail
    find / {{ exclude_ww_cmd }} -type d \( -perm -0002 -a ! -perm -1000 \) 2>/dev/null -exec ls -ald {} + -exec chmod +t {} + || true
  register: chmod_ww
  changed_when: chmod_ww.stdout | length > 0
  when: rhel8STIG_stigrule_230243_Manage

