- name: STIGrule_230274__find_etc_sssd
  ansible.builtin.find:
    paths: /etc/sssd
    patterns: "*.conf"
    file_type: file
    recurse: true
  register: sssd_matches
  when:
    - rhel8STIG_stigrule_230274_Manage

- name: STIGrule_230274__slurp_sssd
  ansible.builtin.slurp:
    src: "{{ item.path }}"
  loop: "{{ sssd_matches.files }}"
  register: sssd_contents
  no_log: true
  when:
    - rhel8STIG_stigrule_230274_Manage
    - sssd_matches is defined

- name: STIGrule_230274__parse_sssd
  ansible.builtin.set_fact:
    parsed_sssd: >-
      {{
        parsed_sssd | default([]) +
        [{
          'file': item.source,
          'matches': (item.content | b64decode | regex_findall('^certificate_verification', multiline=True))
        }]
      }}
  loop: "{{ sssd_contents.results }}"
  no_log: true
  when:
    - rhel8STIG_stigrule_230274_Manage
    - sssd_contents is defined

- name: STIGrule_230274__enable_certificate_verification
  community.general.ini_file:
    path: "{{ item.0.file }}"
    section: "sssd"
    option: "{{ item.1 }}"
    value: "ocsp_dgst=sha1"
    ignore_spaces: false
    # backup: true
    create: false
    follow: true
    state: present
  loop: >
        {{
        parsed_sssd
        | selectattr('matches', 'defined')
        | selectattr('matches', 'contains', 'certificate_verification')
        | list
        | subelements('matches')
         }}
  loop_control:
    label: "{{ item.0.file }} - {{ item.1 }}"
  when:
    - rhel8STIG_stigrule_230274_Manage
    - parsed_sssd is defined
  notify: sssd_restart

- name: STIGrule_230274__create_certificate_verification
  community.general.ini_file:
    path: /etc/sssd/conf.d/certificate_verification.conf
    section: "sssd"
    option: "certificate_verification"
    value: "ocsp_dgst=sha1"
    ignore_spaces: false
    # backup: true
    create: true
    follow: true
    state: present
    mode: '0600'
  when:
    - rhel8STIG_stigrule_230274_Manage
  notify: sssd_restart

