- name: STIGrule_250317__find_config_files_with_forwarding
  ansible.builtin.shell: |
      grep -lr '^net.ipv4.conf.all.forwarding' $(find {{ sysctl_dirs | join(' ') }} -type f ! -type l 2>/dev/null) /etc/sysctl.conf 2>/dev/null
  register: sysctl_output_files
  become: true
  changed_when: false
  vars:
    sysctl_dirs:
      - /run/sysctl.d
      - /usr/local/lib/sysctl.d
      - /usr/lib/sysctl.d
      - /lib/sysctl.d
      - /etc/sysctl.d
  when:
    - rhel8STIG_stigrule_250317_Manage
    - ansible_distribution_version is version('8.4', '>=')

- name: STIGrule_250317__disable_forwarding_in_conf_files
  ansible.posix.sysctl:
    name: net.ipv4.conf.all.forwarding
    value: 0
    state: present
    sysctl_file: "{{ item }}"
    reload: true
  loop: "{{ sysctl_output_files.stdout_lines }}"
  when:
    - rhel8STIG_stigrule_250317_Manage
    - sysctl_output_files.stdout_lines | length > 0
    - ansible_distribution_version is version('8.4', '>=')

- name: STIGrule_250317__define_new_forwarding_config
  ansible.posix.sysctl:
    name: net.ipv4.conf.all.forwarding
    value: 0
    state: present
    sysctl_file: /etc/sysctl.d/99-sysctl.conf
    reload: true
  when:
    - rhel8STIG_stigrule_250317_Manage
    - sysctl_output_files.stdout_lines | length == 0
    - ansible_distribution_version is version('8.4', '>=')

# V-251706 RHEL-08-010121
- name: Check for accounts with blank_passwords
  ansible.builtin.shell: |
    set -o pipefail
    awk -F: '!$2 {print $1}' /etc/shadow | while read user; do
      {% if rhel8STIG_stigrule_251706_IgnoreSvcAccts %}
      uid=$(id -u "$user" 2>/dev/null)
      if [ $? -eq 0 ] && [ "$uid" -ge {{ uid_min }} ]; then
        echo "$user"
      fi
      {% else %}
      echo "$user"
      {% endif %}
    done
  register: blank_password_accounts
  changed_when: false
  when: rhel8STIG_stigrule_251706_Manage

- name: stigrule_251706__lock_accounts_with_blank_passwords
  ansible.builtin.user:
    name: "{{ item }}"
    password_lock: true
  loop: "{{ blank_password_accounts.stdout_lines | difference(rhel8STIG_stigrule_251706_ExcludeAccounts) }}"
  when:
    - rhel8STIG_stigrule_251706_Manage
    - blank_password_accounts.stdout | length > 0

