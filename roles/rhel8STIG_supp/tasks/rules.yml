# V-230303 RHEL-08-010600
- name: Get block devices
  ansible.builtin.command: lsblk -J -o NAME,RM,RO,SIZE,TYPE,MOUNTPOINT
  register: lsblk_out
  changed_when: false
  no_log: true

- name: Parse lsblk json output
  ansible.builtin.set_fact:
    lsblk_data: "{{ lsblk_out.stdout | from_json }}"
  when:
    - lsblk_out is defined and lsblk_out | length > 0

- name: Find removable devices
  ansible.builtin.set_fact:
    removable_devices: >-
      {{
        lsblk_data.blockdevices
        | selectattr('rm', 'equalto', '1')
        | list
      }}
  when:
    - lsblk_data is defined and lsblk_data | length > 0

- name: Get removable device mount point
  ansible.builtin.set_fact:
    removable_mounts: >-
      {{
        removable_devices
        | map(attribute='children')
        | select('defined')
        | sum(start=[])
        | selectattr('mountpoint', 'defined')
        | rejectattr('mountpoint', 'equalto', None)
        | list
      }}
  when:
    - removable_devices is defined and removable_devices | length > 0

- name: STIGrule_230303__get_removable_device_fstab_info
  ansible.builtin.shell: |
    awk '$2 == "{{ item.mountpoint }}" { print }' /etc/fstab
  args:
    executable: /bin/bash
  register: fstab_nodev_entries
  loop: "{{ removable_mounts }}"
  loop_control:
    label: "{{ item.mountpoint }}"
  changed_when: false
  when:
    - rhel8STIG_stigrule_230303_Manage
    - removable_mounts is defined and removable_mounts | length > 0

- name: STIGrule_230303__build_updated_mount_entry
  ansible.builtin.set_fact:
    fstab_nodev_updates: >-
      {{
        fstab_nodev_updates | default([]) + [ {
          'mountpoint': item.item.mountpoint,
          'device': (item.stdout.split()[0] | default('')),
          'fstype': (item.stdout.split()[2] | default('')),
          'opts_new': (
            (
              item.stdout.split()[3] | default('defaults')
            )
            | split(',')
            | reject('equalto', '')
            | list
            + ['nodev']
          ) | unique | join(',')
        } ]
      }}
  loop: "{{ fstab_nodev_entries.results }}"
  loop_control:
    label: "{{ item.item.mountpoint }}"
  when:
    - rhel8STIG_stigrule_230303_Manage
    - fstab_nodev_entries is defined
    - item.stdout is defined
    - item.stdout | length > 0

- name: STIGrule_230303__update_fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    # backup: true
    backrefs: true
    regexp: '^(\S+\s+{{ item.mountpoint | regex_escape }}\s+\S+\s+)(\S+)(\s+.*)$'
    line: '\1{{ item.opts_new }}\3'
  loop: "{{ fstab_nodev_updates }}"
  loop_control:
    label: "{{ item.mountpoint }}"
  when:
    - rhel8STIG_stigrule_230303_Manage
    - fstab_nodev_updates is defined

