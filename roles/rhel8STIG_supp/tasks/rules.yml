- name: Get line numbers from /etc/pam.d/system-auth for pam_faillock and pam_unix entries
  ansible.builtin.shell: |
    awk '
      /pam_faillock\.so/ && /preauth/  && $1=="auth"    && !preauth_line  { preauth_line=NR }
      /pam_faillock\.so/ && /authfail/ && $1=="auth"    && !authfail_line { authfail_line=NR }
      /pam_faillock\.so/ && $1=="account"               && !account_line  { account_line=NR }
      /pam_unix\.so/    && $1=="auth"                   && !unix_line     { unix_line=NR }
      END {
        if (preauth_line)  print "preauth=" preauth_line;
        if (authfail_line) print "authfail=" authfail_line;
        if (account_line)  print "account=" account_line;
        if (unix_line)     print "unix=" unix_line;
      }
    ' /etc/pam.d/system-auth
  register: rhel8stig_v244533_lines
  changed_when: false
  when:
    - rhel8STIG_stigrule_244533_Manage
    - ansible_distribution_version is version('8.2', '>=')

- name: Parse line numbers
  ansible.builtin.set_fact:
    rhel8stig_v244533_preauth_line: >-
      {{ (rhel8stig_v244533_lines.stdout_lines
          | select('match', '^preauth=')
          | map('regex_replace', '^preauth=', '')
          | first | default('0')) | int }}
    rhel8stig_v244533_authfail_line: >-
      {{ (rhel8stig_v244533_lines.stdout_lines
          | select('match', '^authfail=')
          | map('regex_replace', '^authfail=', '')
          | first | default('0')) | int }}
    rhel8stig_v244533_account_line: >-
      {{ (rhel8stig_v244533_lines.stdout_lines
          | select('match', '^account=')
          | map('regex_replace', '^account=', '')
          | first | default('0')) | int }}
    rhel8stig_v244533_unix_line: >-
      {{ (rhel8stig_v244533_lines.stdout_lines
          | select('match', '^unix=')
          | map('regex_replace', '^unix=', '')
          | first | default('0')) | int }}
  when:
    - rhel8STIG_stigrule_244533_Manage
    - ansible_distribution_version is version('8.2', '>=')

- name: stigrule_244533__enable_authselect_with_features
  ansible.builtin.command: "authselect select {{ rhel8STIG_stigrule_authselect_profile }} {{ rhel8STIG_stigrule_authselect_features | join(' ') }} {{ '--force' if rhel8STIG_stigrule_authselect_force | bool else '' }}"
  register: rhel8STIG_244533_authselect_enable
  changed_when: "'Profile' in rhel8STIG_244533_authselect_enable.stdout"
  notify: apply_authselect_changes
  when:
    - rhel8STIG_stigrule_244533_Manage
    - ansible_distribution_version is version('8.2', '>=')
    - (rhel8stig_v244533_preauth_line | int == 0)
      or (rhel8stig_v244533_authfail_line | int == 0)
      or (rhel8stig_v244533_account_line | int == 0)
      or (rhel8stig_v244533_unix_line | int == 0)
    - not (rhel8stig_v244533_preauth_line < rhel8stig_v244533_authfail_line)
      or not (rhel8stig_v244533_authfail_line < rhel8stig_v244533_account_line)
      or not (rhel8stig_v244533_preauth_line < rhel8stig_v244533_unix_line)

