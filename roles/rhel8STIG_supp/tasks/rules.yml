- name: Gather package facts
  ansible.builtin.package_facts:
    manager: auto

- name: Check smtpd_client_restrictions
  ansible.builtin.command:
    cmd: postconf -n smtpd_client_restrictions
  register: smtpd_check
  changed_when: false
  when:
    - rhel8STIG_stigrule_230550_Manage
    - "'postfix' in ansible_facts.packages"

- name: stigrule_230550__set_smtpd_client_restrictions
  ansible.builtin.command:
    cmd: postconf -e 'smtpd_client_restrictions = {{ rhel8STIG_stigrule_230550_smtpd_expected_value }}'
  register: smtpd_client_restrictions
  changed_when: smtpd_client_restrictions.rc == 0
  when:
    - rhel8STIG_stigrule_230550_Manage
    - postfix_installed.rc == 0
    - >
      smtpd_check.stdout_lines | length == 0 or
      'permit_mynetworks' not in smtpd_check.stdout or
      'reject' not in smtpd_check.stdout or
      smtpd_check.stdout
        | regex_replace('^smtpd_client_restrictions\s*=\s*', '')
        | trim
        | lower != rhel8STIG_stigrule_230550_smtpd_expected_value
  notify: reload_postfix

- name: stigrule_230550__verify_smtpd_client_restrictions
  ansible.builtin.command:
    cmd: postconf -n smtpd_client_restrictions
  register: smtpd_verify
  changed_when: false
  failed_when: >
    smtpd_verify.stdout == "" or
    smtpd_verify.stdout
      | regex_replace('^smtpd_client_restrictions\s*=\s*', '')
      | trim
      | lower != rhel8STIG_stigrule_230550_smtpd_expected_value
  when:
    - rhel8STIG_stigrule_230550_Manage
    - postfix_installed.rc == 0

