    nmcli_dns_mode: >-
      {{ (nmcli_dns_mode_line | regex_findall('DNS:\\s*(\\S+)', '\\1')) | default('', true) }}

- name: STIGrule_230316__Report if NetworkManger is disabled and state why
  ansible.builtin.set_fact:
    nm_dns_disabled_reasons: >-
      {{
        []
        + (['dns=none in config'] if (nm_effective_dns | lower) == 'none' else [])
        + (['rc-manager=unmanaged in config'] if (nm_effective_rc_manager | lower) == 'unmanaged' else [])
        + (['/etc/resolv.conf immutable (chattr +i)'] if resolv_immutable else [])
        + (['nmcli DNS mode is none'] if (nmcli_dns_mode | lower) in ['none', 'unmanaged'] else [])
      }}

- name: STIGrule_230316__Set final DNS managed flag
  ansible.builtin.set_fact:
    nm_manages_dns: "{{ nm_dns_disabled_reasons | length == 0 and (nm_service.status is defined) | default(false) }}"

- name: STIGrule_230316__Show DNS management evaluation
  ansible.builtin.debug:
    msg:
      nm_present: "{{ nm_service.status is defined | default(false) }}"
      nm_effective_dns: "{{ nm_effective_dns | default('') }}"
      nm_effective_rc_manager: "{{ nm_effective_rc_manager | default('') }}"
      nmcli_dns_mode: "{{ nmcli_dns_mode | default('') }}"
      resolv_is_symlink: "{{ resolv_stat.stat.islnk | default(false) }}"
      resolv_immutable: "{{ resolv_immutable | default(false) }}"
      nm_dns_disabled_reasons: "{{ nm_dns_disabled_reasons }}"
      nm_manages_dns: "{{ nm_manages_dns }}"

- name: STIGrule_230316__create_empty_etc_resolv.conf_for_local_resolution
  ansible.builtin.copy:
    dest: /etc/resolv.conf
    content: ''
    owner: root
    group: root
    mode: '0644'
  when:
    - rhel8STIG_stigrule_230316_Manage
    - not dns_client

- name: STIGrule_230316__get_NetworkManager_connections
  ansible.builtin.shell: |
      set -o pipefail
      nmcli -t -f DEVICE,TYPE,STATE dev status \
      | awk -F: '$3=="connected"{print $1}' \
      | while read dev; do
        conn=$(nmcli -t -f DEVICE,NAME con show --active | awk -F: -v d="$dev" '$1==d{print $2}')
        flag=$(nmcli -t -f ipv4.ignore-auto-dns con show "$conn" 2>/dev/null | cut -d: -f2)
        echo "$conn:$dev:$flag"
      done
  register: nmcli_dev
  changed_when: false
  when:
    - rhel8STIG_stigrule_230316_Manage
    - nm_manages_dns

- name: STIGrule_230316__parse_NetworkManager_connections
  ansible.builtin.set_fact:
    nm_connections: >-
      {{
        nm_connections | default([]) + [ {'name': con_parts[0], 'device': con_parts[1], 'ignore_auto_dns': con_parts[2]} ]
      }}
  vars:
    con_parts: "{{ item.split(':', 2) }}"
  loop: "{{ nmcli_dev.stdout.splitlines() }}"
  when:
    - rhel8STIG_stigrule_230316_Manage
    - nm_manages_dns

- name: Define interface to apply DNS settings
  ansible.builtin.set_fact:
    dns_interface: rhel8STIG_stigrule_230316_dns_interface  "{{ rhel8STIG_stigrule_230316_dns_interface | default(nm_connections[0].name, true) }}"

- name: STIGrule_230316__read_etc_resolv.conf
  ansible.builtin.slurp:
    src: /etc/resolv.conf
  register: resolv_raw
  no_log: true
  when:
    - rhel8STIG_stigrule_230316_Manage
    - dns_client

- name: STIGrule_230316__extract_nameserver
  ansible.builtin.set_fact:
    resolv_lines: "{{ resolv_raw.content | b64decode | split('\n') }}"
  when:
    - rhel8STIG_stigrule_230316_Manage
    - dns_client

- name: STIGrule_230316__determine_current_nameservers
  ansible.builtin.set_fact:
    current_dns_servers: >-
      {{
        resolv_lines
        | select('search', '^nameserver ')
        | map('split')
        | map('last')
        | list
      }}
  when:
    - rhel8STIG_stigrule_230316_Manage
    - dns_client

- name: STIGrule_230316__set_dns_with_nmcli_on_defined_interface
  ansible.builtin.command:
    cmd: nmcli con mod {{ dns_interface }} ipv4.dns "{{ rhel8STIG_stigrule_230316_nameservers | join(' ') }}"
  register: nmcli_dns_result
  changed_when: nmcli_dns_result.rc == 0
  when:
    - rhel8STIG_stigrule_230316_Manage
    - nm_manages_dns
    - current_dns_servers != rhel8STIG_stigrule_230316_nameservers
    - rhel8STIG_stigrule_230316_nameservers | length > 0
  notify: NetworkManager_restart
  check_mode: true

- name: STIGrule_230316__ignore_dns_from_dhcp_on_defined_interface
  ansible.builtin.command:
    cmd: nmcli con mod "{{ dns_interface }}" ipv4.ignore-auto-dns yes
  register: nmcli_dhcp_result
  changed_when: nmcli_dhcp_result.rc == 0
  when:
    - rhel8STIG_stigrule_230316_Manage
    - rhel8STIG_stigrule_230316_ignore_dhcp_dns
    - nm_manages_dns
    - nm_connections[0].ignore_auto_dns == "no"
  notify: NetworkManager_restart

- name: STIGrule_230316__get_dns_from_dhcp_on_defined_interface
  ansible.builtin.command:
    cmd: nmcli con mod "{{ dns_interface }}" ipv4.ignore-auto-dns no
  register: nmcli_dhcp_result
  changed_when: nmcli_dhcp_result.rc == 0
  when:
    - rhel8STIG_stigrule_230316_Manage
    - not rhel8STIG_stigrule_230316_ignore_dhcp_dns
    - nm_manages_dns
    - nm_connections[0].ignore_auto_dns == "yes"
  notify: NetworkManager_restart

- name: STIGrule_230316__remove_old_nameservers_from_etc_resolv.conf
  ansible.builtin.lineinfile:
    path: /etc/resolv.conf
    state: absent
    regexp: '^[[:space:]]*nameserver[[:space:]]+'
  when:
    - rhel8STIG_stigrule_230316_Manage
    - not nm_manages_dns
    - current_dns_servers != rhel8STIG_stigrule_230316_nameservers

- name: STIGrule_230316__update_etc_resolv.conf
  ansible.builtin.lineinfile:
    path: /etc/resolv.conf
    line: "nameserver {{ item }}"
    state: present
    create: true
    insertafter: EOF
    mode: '0644'
  loop: "{{ rhel8STIG_stigrule_230316_nameservers }}"
  when:
    - rhel8STIG_stigrule_230316_Manage
    - not nm_manages_dns
    - current_dns_servers != rhel8STIG_stigrule_230316_nameservers

