- name: Check crypto policy name
  ansible.builtin.command: update-crypto-policies --show || true
  register: crypto_policy_name
  changed_when: false
  when: rhel8STIG_stigrule_279932_Manage

- name: Check crypto policy is applied
  ansible.builtin.command: update-crypto-policies --is-applied || true
  register: crypto_policy_applied
  changed_when: false
  when: rhel8STIG_stigrule_279932_Manage

- name: Remove crypto-policies package
  ansible.builtin.dnf:
    name: crypto-policies
    state: absent
  when:
    - rhel8STIG_stigrule_279932_Manage
    - crypto_policy_applied.stdout != "The configured policy is applied" or
      crypto_policy_name.stdout != rhel8STIG_stigrule_279932_Policy

- name: stigrule_279932__reinstall_crypto_policies_package # noqa:package-latest
  ansible.builtin.dnf:
    name: crypto-policies
    state: latest
  when:
    - rhel8STIG_stigrule_279932_Manage
    - crypto_policy_applied.stdout != "The configured policy is applied" or
      crypto_policy_name.stdout != rhel8STIG_stigrule_279932_Policy

- name: stigrule_279932__set_crypto_policy
  ansible.builtin.command: "update-crypto-policies --set {{ rhel8STIG_stigrule_279932_Policy }}"
  notify: reboot
  register: rhel8STIG_279932_policy_set
  changed_when: "'Setting system policy' in rhel8STIG_279932_policy_set.stdout"
  when:
    - rhel8STIG_stigrule_279932_Manage
    - crypto_policy_applied.stdout != "The configured policy is applied" or
      crypto_policy_name.stdout != rhel8STIG_stigrule_279932_Policy
