    - boot_mode == "BIOS"
    - grub_pass_check_bios.stdout | length == 0

# R-257788 RHEL-09-212015
- name: Check grub2-editenv for confirm_spawn
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      grub2-editenv list | grep -E 'confirm_spawn(=|[[:space:]])' || true
    executable: /bin/bash
  register: grub2_spawn_check
  changed_when: false
  when:
    - rhel9stig_stigrule_257788_Manage

- name: Check /etc/default/grub for confirm_spawn
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      grep -E 'confirm_spawn(=|[[:space:]])' /etc/default/grub || true
  register: grub_spawn_check
  changed_when: false
  when:
    - rhel9stig_stigrule_257788_Manage

- name: stigrule_257788__grub_remove_confirm_spawn
  ansible.builtin.replace:
    path: /etc/default/grub
    regexp: '(^GRUB_CMDLINE_LINUX="[^"]*)\s*systemd\.confirm_spawn=true\s*([^"]*")'
    replace: '\1 \2'
  when:
    - rhel9stig_stigrule_257788_Manage
    - grub_spawn_check.stdout | length > 0
  notify: grub2_update


- name: stigrule_257788__grubby_remove_confirm_spawn
  ansible.builtin.command: "grubby --update-kernel=ALL --remove-args='systemd.confirm_spawn'"
  register: spawn_result
  changed_when: spawn_result.rc == 0
  notify: grub2_update
  when:
    - rhel9stig_stigrule_257788_Manage
    - "'confirm_spawn' in grub2_spawn_check.stdout"

- name: Run pending handlers
  ansible.builtin.meta: flush_handlers

# R-257789 RHEL-09-212020
- name: Ensure grub2-tools present
  ansible.builtin.package:
    name: grub2-tools
    state: present
  when:
    - rhel9stig_stigrule_257789_Manage

- name: Get current superusers
  ansible.builtin.shell: |
    set -o pipefail
    grep 'set superusers=' /etc/grub.d/01_users | awk -F'"' '{print $2}' || true
  register: current_superuser
  changed_when: false
  when:
    - rhel9stig_stigrule_257789_Manage

- name: Check current password_pbkdf2 account name
  ansible.builtin.shell: |
    set -o pipefail
    grep 'password_pbkdf2' /etc/grub.d/01_users | awk -F' ' '{print $2}' || true
  register: password_pbkdf2_user
  changed_when: false
  when:
    - rhel9stig_stigrule_257789_Manage

- name: stigrule_257789__change_superuser_unique
  ansible.builtin.lineinfile:
    path: /etc/grub.d/01_users
    regexp: '^(.*set superusers=)"[^"]*"'
    line: '\1"{{ rhel9stig_stigrule_257789_unique_name }}"'
    backrefs: true
  when:
    - rhel9stig_stigrule_257789_Manage
    - >
      current_superuser.stdout_lines | intersect(
        (
          interactive_user_list | map(attribute='key') | list
        ) + (
          system_acct_list | map(attribute='key') | list
        )
      ) | length > 0

  register: uefi_superuser_updated

- name: stigrule_257789__change_pbkdf2_to_unique
  ansible.builtin.lineinfile:
    path: /etc/grub.d/01_users
    regexp: '^(.*password_pbkdf2 )\S+(\s+\S+)?$'
    line: '\1"{{ rhel9stig_stigrule_257789_unique_name }}"\2'
    backrefs: true
  register: uefi_password_pbkdf2
  when:
    - rhel9stig_stigrule_257789_Manage
    - >
      password_pbkdf2_user.stdout_lines | intersect(
        (
          interactive_user_list | map(attribute='key') | list
        ) + (
          system_acct_list | map(attribute='key') | list
        )
      ) | length > 0

- name: stigrule_257789__chown_01_users
  ansible.builtin.file:
    path: /etc/grub.d/01_users
    owner: root
    group: root
    mode: '0755'
  when:
    - rhel9stig_stigrule_257789_Manage

- name: stigrule_257789__grub2_update_old
  ansible.builtin.command: grub2-mkconfig -o /boot/grub2/grub.cfg
  register: grub_mkconfig
  changed_when: grub_mkconfig.rc == 0
  when:
    - rhel9stig_stigrule_257789_Manage
    - uefi_superuser_updated.changed or uefi_password_pbkdf2.changed
    - ansible_distribution_version is version('9.3', '<')

- name: stigrule_257789__grub2_update_new
  ansible.builtin.command: grub2-mkconfig -o /boot/grub2/grub.cfg --update-bls-cmdline
  register: grub_mkconfig
  changed_when: grub_mkconfig.rc == 0
  when:
    - rhel9stig_stigrule_257789_Manage
    - uefi_superuser_updated.changed or uefi_password_pbkdf2.changed
    - ansible_distribution_version is version('9.3', '>=')

