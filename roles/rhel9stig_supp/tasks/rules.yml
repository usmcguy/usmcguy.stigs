# R-257817 RHEL-09-213110
- name: Check cpu info for 'nx' flag
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      grep ^flags /proc/cpuinfo | grep -Ev '([^[:alnum:]])(nx)([^[:alnum:]]|$)' || true
  register: nx_flag_check
  changed_when: false
  when:
    - rhel9stig_stigrule_257817_Manage

- name: Check grubby for noexec
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      grubby --info=ALL | grep args | grep -E '([^[:alnum:]])(noexec)([^[:alnum:]])' || true
  register: grubby_noexec_check
  changed_when: false
  when:
    - rhel9stig_stigrule_257817_Manage

- name: stigrule_257817_fail_on_absent_nx
  ansible.builtin.fail:
    msg: Could not find NX flag. Verify that the NX/XD feature is not disabled in the BIOS or UEFI. If it is disabled, enable it.
  when:
    - rhel9stig_stigrule_257817_Manage
    - nx_flag_check.stdout | length > 0

- name: stigrule_257817_remove_noexec_with_grubby
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      grubby --update-kernel=ALL --remove-args=noexec
  register: grubby_noexec_remove
  changed_when: grubby_noexec_remove.rc == 0
  when:
    - rhel9stig_stigrule_257817_Manage
    - grubby_noexec_check.stdout | length > 0

- name: Run pending handlers
  ansible.builtin.meta: flush_handlers

# R-257819 RHEL-09-214010
- name: Get local RPM GPG key fingerprints
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      gpg -q --keyid-format short --with-fingerprint /etc/pki/rpm-gpg/RPM-GPG-KEY-redhat-release || true
  register: rpm_gpg_fingerprint
  changed_when: false
  when:
    - rhel9stig_stigrule_257819_Manage

- name: stigrule_257817_verify_required_local_fingerprints_present
  ansible.builtin.assert:
    that:
      - item.fingerprint in rpm_gpg_fingerprint.stdout
    fail_msg: "Fingerprint '{{ item.name }}' not found in key output"
    success_msg: "'{{ item.name }}' fingerprint verified"
  loop: "{{ rhel9stig_stigrule_257819_key_fingerprints }}"
  ignore_errors: true
  register: fingerprint_check
  when:
    - rhel9stig_stigrule_257819_Manage
    - rpm_gpg_fingerprint.stdout | length > 0

- name: stigrule_257817_attempt_reinstall_redhat-release
  ansible.builtin.command:
    cmd: dnf reinstall -y redhat-release
  register: release_reinstall_result
  changed_when: "'Nothing to do' not in release_reinstall_result.stdout"
  ignore_errors: true
  when:
    - rhel9stig_stigrule_257819_Manage
    - fingerprint_check.msg != "All items completed"

- name: Get fingperprints again after redhat-release reinstalled
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      gpg -q --keyid-format short --with-fingerprint /etc/pki/rpm-gpg/RPM-GPG-KEY-redhat-release || true
  register: validate_rpm_gpg_fingerprint
  changed_when: false
  when:
    - rhel9stig_stigrule_257819_Manage
    - release_reinstall_result.changed is defined
    - release_reinstall_result.changed

- name: stigrule_257817_validate_fingerprints_present
  ansible.builtin.assert:
    that:
      - item.fingerprint in validate_rpm_gpg_fingerprint.stdout
    fail_msg: "Fingerprint '{{ item.name }}' not found in key output"
    success_msg: "'{{ item.name }}' fingerprint verified"
  loop: "{{ rhel9stig_stigrule_257819_key_fingerprints }}"
  ignore_errors: true
  register: fingerprint_validate

- name: Get repo RPM GPG key fingerprints
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      gpg -q --keyid-format short --with-fingerprint {{ rhel9stig_stigrule_257819_src_key_path }} || true
  register: repo_rpm_gpg_fingerprint
  changed_when: false
  when:
    - rhel9stig_stigrule_257819_Manage
    - fingerprint_check.msg != "All items completed"
    - fingerprint_validate.failed
  delegate_to: localhost

- name: Verify required repository fingerprints present
  ansible.builtin.assert:
    that:
      - item.fingerprint in repo_rpm_gpg_fingerprint.stdout
    fail_msg: "Fingerprint '{{ item.name }}' not found in key output"
    success_msg: "'{{ item.name }}' fingerprint verified"
  loop: "{{ rhel9stig_stigrule_257819_key_fingerprints }}"
  register: repo_print_check
  when:
    - rhel9stig_stigrule_257819_Manage
    - repo_rpm_gpg_fingerprint.stdout is defined

- name: stigrule_257819__copy_keys_from_repository
  ansible.builtin.copy:
    src: "{{ rhel9stig_stigrule_257819_src_key_path }}"
    dest: /etc/pki/rpm-gpg/RPM-GPG-KEY-redhat-release
    mode: '0644'
    owner: root
    group: root
  register: repo_rpm_copy
  when:
    - rhel9stig_stigrule_257819_Manage
    - repo_print_check.msg == "All items completed"

- name: stigrule_257819__import_GPG_key
  ansible.builtin.rpm_key:
    state: present
    key: /etc/pki/rpm-gpg/RPM-GPG-KEY-redhat-release
  when:
    - rhel9stig_stigrule_257819_Manage
    - repo_rpm_copy.changed

# R-257822 RHEL-09-214025
- name: stigrule_257822__stat_conf_files
  ansible.builtin.stat:
    path: "{{ item }}"
    get_checksum: false
    get_mime: false
  loop:
    - /etc/yum.conf
    - /etc/dnf/dnf.conf
  register: main_conf_stats
  when: rhel9stig_stigrule_257822_Manage

- name: stigrule_257822__gpgcheck_main_conf_files
  community.general.ini_file:
    path: "{{ item.item }}"
    section: main
    option: gpgcheck
    value: 1
    ignore_spaces: true
    exclusive: true
    follow: true
    mode: '0644'
    owner: root
    group: root
  loop: "{{ main_conf_stats.results }}"
  when:
    - rhel9stig_stigrule_257822_Manage
    - item.stat.exists

- name: Find repo files
  ansible.builtin.find:
    paths: /etc/yum.repos.d
    patterns: "*.repo"
    file_type: file
  register: repo_files
  when: rhel9stig_stigrule_257822_Manage

- name: Read repo files
  ansible.builtin.slurp:
    src: "{{ item.path }}"
  loop: "{{ repo_files.files }}"
  register: repo_file_contents
  no_log: true
  when:
    - rhel9stig_stigrule_257822_Manage

- name: Define regex filter for repo names
  ansible.builtin.set_fact:
    repo_section_regex: "\\[([^\\]]+?)\\]"
  when:
    - rhel9stig_stigrule_257822_Manage

- name: Build repo section map
  ansible.builtin.set_fact:
    repo_sections: >-
      {{
        repo_sections | default([]) +
        [
          {
            'path': item.source,
            'sections': (
              item.content
              | b64decode
              | regex_findall(repo_section_regex)
            )
          }
        ]
      }}
  loop: "{{ repo_file_contents.results }}"
  no_log: true
  when:
    - rhel9stig_stigrule_257822_Manage

- name: stigrule_257822_set_gpgcheck
  community.general.ini_file:
    path: "{{ item.0.path }}"
    section: "{{ item.1 }}"
    option: gpgcheck
    value: "{{ rhel9stig_stigrule_257822_gpgcheck }}"
    no_extra_spaces: false
    ignore_spaces: true
    create: false
  loop: "{{ (repo_sections | default([])) | subelements('sections') }}"
  loop_control:
    label: "{{ item.0.path }} :: {{ item.1 }}"
  no_log: true
  when:
    - rhel9stig_stigrule_257822_Manage
    - repo_sections is defined

